<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Little Universe — Wishing Star</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap');

  /* ============================================================
     RESET & BASE
  ============================================================ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    width:100%; height:100%;
    overflow:hidden;
    background:#050514;
    font-family:'Baloo 2','Segoe UI Rounded',-apple-system,sans-serif;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
  }
  #app {
    position:fixed; inset:0;
    width:100vw; height:100vh; height:100dvh;
    overflow:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }

  /* ============================================================
     SKY / AURORA / FOG (decorative, GPU composited layers)
  ============================================================ */
  #sky {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, #171a3d 0%, #0c0e28 40%, #050514 75%),
      linear-gradient(180deg,#060618 0%,#050514 100%);
  }

  .aurora-layer {
    position:absolute; inset:-10%;
    filter:blur(min(9vw,60px));
    mix-blend-mode:screen;
    opacity:var(--aurora-strength,0.55);
    transition:opacity 1.8s ease;
    will-change:opacity;
  }
  .aurora-blob {
    position:absolute;
    width:70vw; height:60vh;
    border-radius:50%;
    opacity:.55;
    will-change:transform;
  }
  .aurora-blob.a1{
    top:-10%; left:-15%;
    background:radial-gradient(circle,#7fe8c9 0%,rgba(127,232,201,0) 70%);
    animation:auroraDrift1 26s ease-in-out infinite;
  }
  .aurora-blob.a2{
    top:5%; left:35%;
    background:radial-gradient(circle,#a78bfa 0%,rgba(167,139,250,0) 70%);
    animation:auroraDrift2 32s ease-in-out infinite;
  }
  .aurora-blob.a3{
    top:20%; left:5%;
    background:radial-gradient(circle,#f6b8d6 0%,rgba(246,184,214,0) 70%);
    animation:auroraDrift3 38s ease-in-out infinite;
  }
  @keyframes auroraDrift1{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(8vw,4vh) scale(1.15); }
  }
  @keyframes auroraDrift2{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-10vw,6vh) scale(1.1); }
  }
  @keyframes auroraDrift3{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(6vw,-5vh) scale(1.2); }
  }

  #fog {
    position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(180,190,255,0) 0%,rgba(180,190,255,.05) 55%,rgba(200,205,255,.09) 100%);
    opacity:.8;
    animation:fogSway 18s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes fogSway{
    0%,100%{ transform:translateX(0) translateY(0); }
    50%{ transform:translateX(2vw) translateY(-1vh); }
  }

  #scene {
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
    transition:transform 1.4s cubic-bezier(.22,1,.36,1);
    will-change:transform;
  }
  #scene.zoom { transform:scale(1.18); }

  /* ============================================================
     MESSAGE OVERLAY (the wish text)
  ============================================================ */
  #messageOverlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    padding:0 8vw;
    pointer-events:none;
  }
  #messageOverlay span{
    font-family:'Baloo 2',sans-serif;
    font-weight:700;
    font-size:clamp(20px,5.4vw,34px);
    color:#fff8ec;
    text-shadow:0 0 18px rgba(255,244,214,.85), 0 0 46px rgba(167,139,250,.5);
    opacity:0;
    transform:translateY(10px) scale(.96);
    transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.22,1,.36,1);
  }
  #messageOverlay span.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  /* ============================================================
     LUMI — the little light mascot
  ============================================================ */
  #lumiAnchor{
    position:absolute;
    bottom:calc(10vh + env(safe-area-inset-bottom));
    left:50%;
    width:clamp(96px,28vw,160px);
    aspect-ratio:1/1;
    transform:translate(-50%,220%) rotate(0deg);
    opacity:0;
    z-index:5;
  }
  #lumiAnchor.fly-in{
    animation:lumiFlyIn 1.9s cubic-bezier(.2,.9,.25,1) forwards;
  }
  @keyframes lumiFlyIn{
    0%   { transform:translate(-160vw,-10%) rotate(-18deg) scale(.85); opacity:0; }
    8%   { opacity:1; }
    55%  { transform:translate(-10%,-38%) rotate(340deg) scale(1.05); }
    78%  { transform:translate(2%,-4%) rotate(360deg) scale(1); }
    88%  { transform:translate(-50%,6%) rotate(360deg) scale(1.08,.9); }
    100% { transform:translate(-50%,0%) rotate(360deg) scale(1); opacity:1; }
  }

  #lumiAnchor.sit{ animation:lumiSit 1s ease forwards; }
  @keyframes lumiSit{
    0%{ transform:translate(-50%,0%) rotate(0deg) scale(1); }
    45%{ transform:translate(-50%,6%) rotate(0deg) scale(1.05,.9); }
    100%{ transform:translate(-50%,4%) rotate(0deg) scale(1,.96); }
  }

  #lumiAnchor.fly-away{
    animation:lumiFlyAway 3.2s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes lumiFlyAway{
    0%{ transform:translate(-50%,4%) scale(1) rotate(0deg); opacity:1; }
    30%{ transform:translate(-30%,-40%) scale(.8) rotate(20deg); opacity:1; }
    100%{ transform:translate(10%,-260%) scale(.08) rotate(80deg); opacity:0; }
  }

  #lumiFloat{
    width:100%; height:100%;
    position:relative;
    animation:lumiIdleFloat 4.2s ease-in-out infinite;
    transform-origin:center bottom;
  }
  @keyframes lumiIdleFloat{
    0%,100%{ transform:translateY(0) rotate(-2deg); }
    50%{ transform:translateY(-6%) rotate(2deg); }
  }
  #lumiAnchor.jump #lumiFloat{ animation:lumiJump .7s cubic-bezier(.34,1.56,.64,1) 1; }
  @keyframes lumiJump{
    0%{ transform:translateY(0) scale(1,1); }
    30%{ transform:translateY(6%) scale(1.12,.85); }
    60%{ transform:translateY(-42%) scale(.92,1.1); }
    100%{ transform:translateY(0) scale(1,1); }
  }
  #lumiAnchor.spin #lumiFloat{ animation:lumiSpin .7s ease-in-out 1; }
  @keyframes lumiSpin{
    0%{ transform:rotate(0deg) scale(1); }
    50%{ transform:rotate(200deg) scale(1.06); }
    100%{ transform:rotate(360deg) scale(1); }
  }
  #lumiAnchor.clap #lumiFloat{ animation:lumiClap .8s ease-in-out 1; }
  @keyframes lumiClap{
    0%,100%{ transform:scale(1); }
    20%,60%{ transform:scale(1.06,.94); }
    40%,80%{ transform:scale(.96,1.05); }
  }

  #lumiBody{
    position:absolute; left:50%; top:8%;
    width:78%; height:78%;
    transform:translateX(-50%);
    border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #fffdf6 0%, #fff3d9 42%, #ffe6b8 75%, #ffd7a0 100%);
    box-shadow:
      0 0 clamp(20px,7vw,46px) rgba(255,240,200,.9),
      0 0 clamp(40px,12vw,90px) rgba(255,214,150,.55),
      inset 0 -6px 14px rgba(255,190,120,.35);
    animation:lumiGlow 5s ease-in-out infinite;
  }
  @keyframes lumiGlow{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.12); }
  }

  .lumi-cheek{
    position:absolute; width:14%; height:9%;
    background:#ffb3c6; border-radius:50%;
    opacity:.65; filter:blur(.4px);
    top:56%;
  }
  .lumi-cheek.l{ left:14%; }
  .lumi-cheek.r{ right:14%; }

  .lumi-eye{
    position:absolute; top:38%;
    width:9%; height:9%;
    background:#241a17; border-radius:50%;
    animation:lumiBlink 4.6s ease-in-out infinite, lumiLook 7.5s ease-in-out infinite;
  }
  .lumi-eye.l{ left:33%; }
  .lumi-eye.r{ left:56%; }
  @keyframes lumiBlink{
    0%,92%,100%{ transform:scaleY(1); }
    95%{ transform:scaleY(.1); }
  }
  @keyframes lumiLook{
    0%,20%{ transform:translateX(0); }
    35%,45%{ transform:translateX(-18%); }
    60%,70%{ transform:translateX(18%); }
    85%,100%{ transform:translateX(0); }
  }

  .lumi-mouth{
    position:absolute; left:50%; top:56%;
    width:16%; height:8%;
    transform:translateX(-50%);
    border-bottom:3px solid #6b4a2e;
    border-radius:0 0 50% 50%;
    opacity:.75;
  }

  .lumi-star{
    position:absolute; left:50%; top:-14%;
    width:26%; height:26%;
    transform:translateX(-50%);
    filter:drop-shadow(0 0 6px rgba(255,241,190,.9));
    animation:lumiStarBob 3.6s ease-in-out infinite;
  }
  @keyframes lumiStarBob{
    0%,100%{ transform:translateX(-50%) translateY(0) rotate(0deg); }
    50%{ transform:translateX(-50%) translateY(-14%) rotate(18deg); }
  }
  .lumi-star svg{ width:100%; height:100%; display:block; }

  .lumi-hand{
    position:absolute; top:48%;
    width:13%; height:13%;
    border-radius:50%;
    background:#fff3d9;
    box-shadow:0 0 10px rgba(255,240,200,.8);
  }
  .lumi-hand.l{ left:-4%; transform-origin:80% 30%; }
  .lumi-hand.r{ right:-4%; transform-origin:20% 30%; }
  #lumiAnchor.wave .lumi-hand.r{ animation:handWave .9s ease-in-out 3; }
  @keyframes handWave{
    0%,100%{ transform:rotate(0deg); }
    50%{ transform:rotate(-45deg) translateY(-10%); }
  }
  #lumiAnchor.point .lumi-hand.r{
    transform:rotate(-70deg) translateY(-30%) translateX(10%);
    transition:transform .6s cubic-bezier(.22,1,.36,1);
  }

  /* ============================================================
     CHAT BUBBLE (glassmorphism)
  ============================================================ */
  #bubble{
    position:absolute;
    bottom:calc(10vh + env(safe-area-inset-bottom));
    left:50%;
    transform:translate(-50%,0) scale(.9);
    max-width:min(78vw,360px);
    min-width:150px;
    padding:clamp(12px,3.4vw,18px) clamp(16px,4.4vw,22px);
    border-radius:26px;
    background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.35);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 8px 30px rgba(20,10,40,.35), inset 0 0 20px rgba(255,255,255,.08);
    color:#fffaf0;
    text-align:center;
    font-weight:600;
    font-size:clamp(14px,3.6vw,18px);
    line-height:1.35;
    opacity:0;
    pointer-events:none;
    transition:opacity .45s ease, transform .45s cubic-bezier(.22,1,.36,1);
    z-index:6;
  }
  #bubble::after{
    content:'';
    position:absolute; left:50%; bottom:-9px;
    width:18px; height:18px;
    transform:translateX(-50%) rotate(45deg);
    background:rgba(255,255,255,.14);
    border-right:1px solid rgba(255,255,255,.35);
    border-bottom:1px solid rgba(255,255,255,.35);
    border-radius:0 0 4px 0;
    backdrop-filter:blur(14px);
  }
  #bubble.show{
    opacity:1;
    transform:translate(-50%,-2%) scale(1);
    pointer-events:auto;
  }
  #bubble.fade-swap{ opacity:0; transform:translate(-50%,2%) scale(.96); }

  #ctaBtn{
    margin-top:10px;
    display:inline-block;
    padding:8px 22px;
    border:none;
    border-radius:999px;
    background:linear-gradient(180deg,#fff3d9,#ffd79a);
    color:#5b3a1a;
    font-family:'Baloo 2',sans-serif;
    font-weight:800;
    font-size:clamp(13px,3.2vw,16px);
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    cursor:pointer;
  }
  #ctaBtn:active{ transform:scale(.94); }

  /* ============================================================
     FINAL BLACK CURTAIN (opening fade-in from dark)
  ============================================================ */
  #curtain{
    position:absolute; inset:0;
    background:#000;
    z-index:50;
    opacity:1;
    transition:opacity 2.4s ease;
    pointer-events:none;
  }
  #curtain.hide{ opacity:0; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001s !important; transition-duration:.001s !important; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="sky"></div>
  <div class="aurora-layer">
    <div class="aurora-blob a1"></div>
    <div class="aurora-blob a2"></div>
    <div class="aurora-blob a3"></div>
  </div>
  <div id="fog"></div>
  <canvas id="scene"></canvas>

  <div id="messageOverlay"><span id="messageText"></span></div>

  <!-- LUMI -->
  <div id="lumiAnchor">
    <div id="lumiFloat">
      <div class="lumi-hand l"></div>
      <div class="lumi-hand r"></div>
      <div id="lumiBody">
        <div class="lumi-eye l"></div>
        <div class="lumi-eye r"></div>
        <div class="lumi-mouth"></div>
        <div class="lumi-cheek l"></div>
        <div class="lumi-cheek r"></div>
      </div>
      <div class="lumi-star">
        <svg viewBox="0 0 24 24"><path fill="#fff1be" d="M12 0 L14.5 9.2 L24 12 L14.5 14.8 L12 24 L9.5 14.8 L0 12 L9.5 9.2 Z"/></svg>
      </div>
    </div>
  </div>

  <!-- BUBBLE -->
  <div id="bubble">
    <div id="bubbleText">Halooo yakesss 👋</div>
    <button id="ctaBtn" style="display:none;">Ayo!</button>
  </div>

  <div id="curtain"></div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     SETUP
  ============================================================ */
  var canvas = document.getElementById('scene');
  var ctx = canvas.getContext('2d');
  var lumiAnchor = document.getElementById('lumiAnchor');
  var bubble = document.getElementById('bubble');
  var bubbleText = document.getElementById('bubbleText');
  var ctaBtn = document.getElementById('ctaBtn');
  var curtain = document.getElementById('curtain');
  var messageOverlay = document.getElementById('messageOverlay');
  var messageText = document.getElementById('messageText');
  var auroraLayer = document.querySelector('.aurora-layer');

  var DPR = Math.min(window.devicePixelRatio || 1, 2.2);
  var W = 0, H = 0;

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize, { passive:true });
  resize();

  var sleep = function(ms){ return new Promise(function(res){ setTimeout(res, ms); }); };

  /* ============================================================
     STAR FIELD
  ============================================================ */
  var STAR_COUNT = (W*H > 500000) ? 190 : 150;
  var stars = [];
  var targetStar = null;

  function rand(a,b){ return a + Math.random()*(b-a); }

  function makeStars(){
    stars = [];
    for(var i=0;i<STAR_COUNT;i++){
      stars.push({
        x: Math.random(),
        y: Math.random()*0.82,
        size: rand(0.9,2.1),
        baseAlpha: rand(.35,.9),
        phase: Math.random()*Math.PI*2,
        speed: rand(.6,1.6),
        isTarget:false,
        permanent:false
      });
    }
    targetStar = {
      x: rand(.58,.86),
      y: rand(.14,.34),
      size: 3.4,
      baseAlpha: 1,
      phase: 0,
      speed: .8,
      isTarget:true,
      hover:0
    };
    stars.push(targetStar);
  }
  makeStars();

  /* ambient floating particles */
  var particles = [];
  var PARTICLE_COUNT = (W*H > 500000) ? 46 : 34;
  function makeParticles(){
    particles = [];
    for(var i=0;i<PARTICLE_COUNT;i++){
      particles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: rand(.6,1.8),
        vx: rand(-3,3)/60,
        vy: rand(-10,-4)/60,
        a: rand(.15,.5)
      });
    }
  }
  makeParticles();

  var shootingStars = [];
  var lastShootTime = 0;

  function spawnShootingStar(){
    shootingStars.push({
      x: rand(W*0.15, W*0.75),
      y: rand(H*0.05, H*0.35),
      vx: rand(5.5,8.5),
      vy: rand(2.5,4.2),
      life: 1,
      len: rand(70,130)
    });
  }

  var burst = [];
  function spawnBurst(x,y,count){
    for(var i=0;i<count;i++){
      var ang = Math.random()*Math.PI*2;
      var spd = rand(1.2,6.5);
      burst.push({
        x:x, y:y,
        vx:Math.cos(ang)*spd,
        vy:Math.sin(ang)*spd,
        r: rand(1,3),
        life:1,
        decay: rand(.006,.016)
      });
    }
  }

  /* ============================================================
     ANIMATION LOOP
  ============================================================ */
  var t = 0;
  var timeScale = 1;
  var targetTimeScale = 1;
  var gameActive = false;
  var rafId = null;
  var running = true;

  var fpsSamples = [];
  var lastFrame = performance.now();

  function drawStar5(cx,cy,r,alpha,color){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function frame(now){
    if(!running) return;
    var dt = Math.min(now - lastFrame, 48);
    lastFrame = now;

    fpsSamples.push(dt);
    if(fpsSamples.length > 40){
      fpsSamples.shift();
      var avg = fpsSamples.reduce(function(a,b){return a+b;},0)/fpsSamples.length;
      if(avg > 30 && particles.length > 12){
        particles.splice(0, 4);
      }
    }

    timeScale += (targetTimeScale - timeScale) * 0.04;
    t += dt * 0.001 * timeScale;

    ctx.clearRect(0,0,W,H);

    /* stars */
    for(var i=0;i<stars.length;i++){
      var s = stars[i];
      var tw = 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
      var alpha = s.baseAlpha * (0.55 + 0.45*tw);
      var px = s.x*W, py = s.y*H;

      if(s.isTarget){
        var hoverBoost = s.hover || 0;
        var pulse = 0.7 + 0.3*Math.sin(t*1.4);
        var glowR = (18 + hoverBoost*16) * pulse;
        var grad = ctx.createRadialGradient(px,py,0,px,py,glowR);
        grad.addColorStop(0,'rgba(255,250,225,'+(0.55+hoverBoost*0.25)+')');
        grad.addColorStop(1,'rgba(255,250,225,0)');
        ctx.save();
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px,py,glowR,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
        drawStar5(px,py,s.size + hoverBoost*0.8, 1, '#fff9e8');
      } else {
        drawStar5(px,py,s.size, alpha, s.permanent ? '#fff5d8' : '#eef1ff');
      }
    }

    /* shooting stars — ambient spawn */
    if(!gameActive && now - lastShootTime > rand(6000,12000)){
      lastShootTime = now;
      spawnShootingStar();
    }
    for(var j=shootingStars.length-1;j>=0;j--){
      var sh = shootingStars[j];
      sh.x += sh.vx * dt * 0.06 * timeScale;
      sh.y += sh.vy * dt * 0.06 * timeScale;
      sh.life -= 0.004 * dt * 0.06;
      if(sh.life <= 0 || sh.x > W+100 || sh.y > H+100){
        shootingStars.splice(j,1);
        continue;
      }
      ctx.save();
      ctx.globalAlpha = Math.max(sh.life,0);
      var grad2 = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.len, sh.y - sh.len*0.45);
      grad2.addColorStop(0,'rgba(255,255,255,.95)');
      grad2.addColorStop(1,'rgba(255,255,255,0)');
      ctx.strokeStyle = grad2;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh.x - sh.len, sh.y - sh.len*0.45);
      ctx.stroke();
      ctx.restore();
    }

    /* ambient particles */
    for(var k=0;k<particles.length;k++){
      var p = particles[k];
      p.x += p.vx * dt * timeScale;
      p.y += p.vy * dt * timeScale;
      if(p.y < -5) p.y = H+5;
      if(p.x < -5) p.x = W+5;
      if(p.x > W+5) p.x = -5;
      drawStar5(p.x,p.y,p.r,p.a,'#ffffff');
    }

    /* explosion burst particles */
    for(var b=burst.length-1;b>=0;b--){
      var bp = burst[b];
      bp.x += bp.vx * dt * 0.09 * timeScale;
      bp.y += bp.vy * dt * 0.09 * timeScale;
      bp.vx *= 0.985; bp.vy *= 0.985;
      bp.life -= bp.decay * dt * 0.09;
      if(bp.life <= 0){ burst.splice(b,1); continue; }
      drawStar5(bp.x,bp.y,bp.r,Math.max(bp.life,0),'#fff3cf');
    }

    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);

  /* ============================================================
     POINTER / GAME LOGIC (target-star tap detection)
  ============================================================ */
  function getCanvasPos(evt){
    var rect = canvas.getBoundingClientRect();
    var cx = (evt.clientX !== undefined) ? evt.clientX : (evt.touches && evt.touches[0].clientX);
    var cy = (evt.clientY !== undefined) ? evt.clientY : (evt.touches && evt.touches[0].clientY);
    return { x: cx - rect.left, y: cy - rect.top };
  }

  function onPointerMove(evt){
    if(!gameActive || !targetStar) return;
    var pos = getCanvasPos(evt);
    var tx = targetStar.x*W, ty = targetStar.y*H;
    var d = Math.hypot(pos.x - tx, pos.y - ty);
    var r = Math.min(W,H) * 0.09;
    targetStar.hover = d < r ? (1 - d/r) : 0;
  }

  function onPointerDown(evt){
    if(!gameActive || !targetStar) return;
    var pos = getCanvasPos(evt);
    var tx = targetStar.x*W, ty = targetStar.y*H;
    var d = Math.hypot(pos.x - tx, pos.y - ty);
    var r = Math.max(28, Math.min(W,H) * 0.055);
    if(d < r){
      onWishStarFound(tx,ty);
    }
  }

  canvas.addEventListener('pointermove', onPointerMove, { passive:true });
  canvas.addEventListener('pointerdown', onPointerDown, { passive:true });

  /* ============================================================
     BUBBLE HELPERS
  ============================================================ */
  function showBubble(text, withButton){
    return new Promise(function(resolve){
      bubble.classList.add('fade-swap');
      setTimeout(function(){
        bubbleText.textContent = text;
        ctaBtn.style.display = withButton ? 'inline-block' : 'none';
        bubble.classList.remove('fade-swap');
        bubble.classList.add('show');
        resolve();
      }, 260);
    });
  }
  function hideBubble(){
    bubble.classList.remove('show');
  }

  function showMessageLine(text, holdMs){
    return new Promise(function(resolve){
      messageText.textContent = text;
      requestAnimationFrame(function(){
        messageText.classList.add('show');
      });
      setTimeout(function(){
        messageText.classList.remove('show');
        setTimeout(resolve, 1100);
      }, holdMs);
    });
  }

  /* ============================================================
     LUMI ANIMATION HELPERS
  ============================================================ */
  function addTempClass(el, cls, duration){
    return new Promise(function(resolve){
      el.classList.add(cls);
      setTimeout(function(){
        el.classList.remove(cls);
        resolve();
      }, duration);
    });
  }

  /* ============================================================
     MAIN SEQUENCE
  ============================================================ */
  async function main(){
    await sleep(500);
    curtain.classList.add('hide');
    await sleep(900);

    lumiAnchor.classList.add('fly-in');
    await sleep(1900);
    await addTempClass(lumiAnchor, 'landed', 1);

    await sleep(250);
    lumiAnchor.classList.add('wave');
    await showBubble('Halooo yakesss', false);
    await sleep(1900);

    await showBubble('Selamat datang di Little Universe.', false);
    await sleep(2000);
    lumiAnchor.classList.remove('wave');

    await showBubble('Hari ini aku punya hadiah kecil.', false);
    await sleep(2000);

    await showBubble('Mau bantu aku mencarinya?', true);

    await new Promise(function(resolve){
      function handler(){
        ctaBtn.removeEventListener('pointerdown', handler);
        ctaBtn.removeEventListener('click', handler);
        ctaBtn.style.pointerEvents = 'none';
        resolve();
      }
      ctaBtn.addEventListener('pointerdown', handler, { once:true });
      ctaBtn.addEventListener('click', handler, { once:true });
    });

    await showBubble('Ayo cari bintang yang paling terang ✨', false);
    lumiAnchor.classList.add('point');
    await sleep(900);

    gameActive = true;
  }

  async function onWishStarFound(sx, sy){
    if(!gameActive) return;
    gameActive = false;
    canvas.removeEventListener('pointermove', onPointerMove);
    canvas.removeEventListener('pointerdown', onPointerDown);
    lumiAnchor.classList.remove('point');
    hideBubble();

    targetTimeScale = 0.32;
    canvas.classList.add('zoom');
    auroraLayer.style.setProperty('--aurora-strength', '0.95');

    spawnBurst(sx, sy, 140);
    await sleep(650);
    spawnBurst(sx, sy, 90);
    await sleep(1000);

    canvas.classList.remove('zoom');
    targetTimeScale = 1;
    await sleep(600);

    await addTempClass(lumiAnchor, 'jump', 700);
    await addTempClass(lumiAnchor, 'spin', 700);
    await addTempClass(lumiAnchor, 'clap', 800);
    spawnBurst(0.5*W, 0.62*H, 26);

    await sleep(400);
    await showMessageLine('Semoga hari ini menjadi hari yang indah.', 2200);
    await showMessageLine('Terima kasih sudah meluangkan sedikit waktu.', 2200);
    await showMessageLine('Sampai bertemu di hadiah kecil berikutnya.', 2200);

    await ending();
  }

  async function ending(){
    lumiAnchor.classList.add('sit');
    await sleep(900);

    spawnShootingStar();
    await sleep(1400);

    lumiAnchor.classList.add('wave');
    await showBubble('Sampai besok ya! 🤍', false);
    await sleep(2200);
    lumiAnchor.classList.remove('wave');
    hideBubble();

    await sleep(500);
    lumiAnchor.classList.remove('sit');
    lumiAnchor.classList.add('fly-away');
    await sleep(3200);

    stars.push({
      x: 0.62, y: 0.1,
      size: 2.6,
      baseAlpha: 1,
      phase: Math.random()*Math.PI*2,
      speed: 1,
      isTarget:false,
      permanent:true
    });

    await sleep(1200);

    running = false;
    if(rafId) cancelAnimationFrame(rafId);
    ctx.clearRect(0,0,W,H);
    drawFinalFrame();
  }

  function drawFinalFrame(){
    for(var i=0;i<stars.length;i++){
      var s = stars[i];
      var px = s.x*W, py = s.y*H;
      drawStar5(px,py,s.size, s.baseAlpha*0.85, s.permanent ? '#fff5d8' : '#eef1ff');
    }
  }

  document.addEventListener('visibilitychange', function(){
    if(document.hidden){ lastFrame = performance.now(); }
  });

  main();
})();
</script>
</body>
</html>
